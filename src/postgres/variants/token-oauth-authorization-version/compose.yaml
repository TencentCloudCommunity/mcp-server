services:
  postgres-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: mcp-server-postgres:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MCP_SERVER_BIND_HOST: 0.0.0.0
    ports:
      - "127.0.0.1:${MCP_SERVER_PORT:-9000}:${MCP_SERVER_PORT:-9000}"
    volumes:
      - ./data:/app/data
